services:
  - type: web
    name: snaqquest-backend
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: false
    healthCheckPath: /health/
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: |
      python manage.py migrate
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SERVE_MEDIA_FILES
        value: "True"
      - key: DJANGO_MEDIA_ROOT
        value: "/var/data/media"
      - key: LOG_LEVEL
        value: "INFO"
